<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>দোকান ম্যানেজার - বাকি</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
 --green:#1D9E75;--green-light:#E1F5EE;--green-dark:#0F6E56;\n  --amber:#BA7517;--amber-light:#FAEEDA;\n  --red:#A32D2D;--red-light:#FCEBEB;\n  --bg:#F9F8F5;--white:#fff;\n  --border:#D3D1C7;--radius:12px;--radius-sm:8px;\n  --text:#2C2C2A;--text3:#888780;--gray-light:#F1EFE8;\n}
body{font-family:'Hind Siliguri',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}

.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:var(--white);border-top:1px solid var(--border);display:flex;z-index:100}
.nav-btn{flex:1;padding:8px 4px 10px;background:none;text-decoration:none;display:flex;flex-direction:column;align-items:center;gap:3px;color:var(--text3);font-size:11px;border-top:2px solid transparent}
.nav-btn.active{color:var(--green);border-top-color:var(--green)}
.nav-btn svg{width:22px;height:22px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}

.header{background:var(--green);color:#fff;padding:14px 16px;display:flex;align-items:center;justify-content:space-between}
.header h1{font-size:18px;font-weight:700}
.container{padding:12px 12px 80px}

.card{background:var(--white);border:1px solid var(--border);border-radius:var(--radius);padding:14px;margin-bottom:12px;display:flex;justify-content:space-between;align-items:center}
.card-left{flex:1}
.customer-name{font-size:15px;font-weight:700;margin-bottom:2px}
.customer-meta{font-size:12px;color:var(--text3)}
.card-right{text-align:right}
.due-amount{font-size:16px;font-weight:700;color:var(--red);margin-bottom:6px}

.btn-action{background:var(--gray-light);color:var(--text);padding:5px 10px;border-radius:6px;font-size:12px;font-weight:600;border:none;display:inline-flex;align-items:center;gap:4px}
.btn-action:active{opacity:.8}

/* Modal Overlay base layout sheet */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:200;display:none;align-items:center;justify-content:center;padding:16px}
.modal-overlay.open{display:flex}
.modal-card{background:#fff;width:100%;max-width:400px;border-radius:12px;padding:16px;box-shadow:0 8px 24px rgba(0,0,0,0.15);max-height:85vh;overflow-y:auto}
.modal-header{font-size:16px;font-weight:700;margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between}
.modal-body{font-size:14px;line-height:1.5}
.modal-close-btn{background:none;border:none;font-size:16px;cursor:pointer;color:var(--text3)}

.history-item {background:var(--bg); border-radius:6px; padding:8px; margin-top:6px; font-size:12px;}
</style>
</head>
<body>

<div class="header">
  <h1 id="shop-name-header">দোকান ম্যানেজার</h1>
</div>

<div class="container" id="dues-list-container">
  </div>

<div class="modal-overlay" id="due-details-modal">
  <div class="modal-card">
    <div class="modal-header">
      <span>👤 বাকি খাতার পূর্ণাঙ্গ বিবরণ</span>
      <button type="button" class="modal-close-btn" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body" id="due-modal-body-content">
      </div>
  </div>
</div>

<nav class="bottom-nav">
  <a href="index.html" class="nav-btn">
    <svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
    হোম
  </a>
  <a href="sales2.html" class="nav-btn">
    <svg viewBox="0 0 24 24"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 001.98 1.61h9.72a2 2 0 001.98-1.61L23 6H6"/></svg>
    বিক্রয়
  </a>
  <a href="inventory.html" class="nav-btn">
    <svg viewBox="0 0 24 24"><rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8M12 17v4"/></svg>
    স্টক
  </a>
  <a href="due.html" class="nav-btn active">
    <svg viewBox="0 0 24 24"><rect x="1" y="4" width="22" height="16" rx="2"/><line x1="1" y1="10" x2="23" y2="10"/></svg>
    বাকি
  </a>
  <a href="report.html" class="nav-btn">
    <svg viewBox="0 0 24 24"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
    রিপোর্ট
  </a>
</nav>

<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyCjgxzZQvpqdUNnAlr81UEwp5E6Rf6kbq4",
  authDomain: "hisab-khata-cf78c.firebaseapp.com",
  projectId: "hisab-khata-cf78c",
  storageBucket: "hisab-khata-cf78c.firebasestorage.app",
  messagingSenderId: "305149303536",
  appId: "1:305149303536:web:86f67fcb3c10a30b209867"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

let state = { settings:{shopName:'দোকান ম্যানেজার'}, products:[], sales:[], dues:[] };

function save(){
  // ⚠️ Empty বা Undefined স্টেট ওভাররাইট হওয়া প্রতিরোধে সুরক্ষাকবচ
  if(!state || (!state.products && !state.sales && !state.dues)) return;

  localStorage.setItem('dukan_state', JSON.stringify(state));

  const user = auth.currentUser;
  if(user && state.products){
    db.collection("users").doc(user.uid).set(state)
      .catch(e => console.error("ক্লাউড ব্যাকআপ ব্যর্থ হয়েছে:", e));
  }
}

function bn(n){return String(Math.round(n)).replace(/[0-9]/g,c=>['০','১','২','৩','৪','৫','৬','৭','৮','৯'][c])}
function bnMoney(n){return '৳'+bn(n)}
function dateLabel(dateStr){ const d=new Date(dateStr); return bn(d.getDate())+' '+['জানুয়ারি','ফেব্রুয়ারি','মার্চ','এপ্রিল','মে','জুন','জুলাই','আগস্ট','সেপ্টেম্বর','অক্টোবর','নভেম্বর','ডিসেম্বর'][d.getMonth()]+', '+bn(d.getFullYear());}

// ⚡ INSTANT LOCAL LOAD (ফাস্টেস্ট ক্যাশ রেন্ডার)
const cachedState = localStorage.getItem('dukan_state');
if (cachedState) {
  try {
    state = JSON.parse(cachedState);
    setTimeout(initializeAppUI, 10);
  } catch (e) {}
}

// 🔐 AUTHENTICATION GATEWAY (Fixing Overwrite/Reset Issue on Login & Logout)
auth.onAuthStateChanged(user => {
  if (user) {
    db.collection("users").doc(user.uid).get().then(doc => {
      // ⚠️ Critical Safe Check: সার্ভারে ডাটা থাকলেই কেবল স্টেট আপডেট হবে, ব্ল্যাঙ্ক ডাটা হলে নয়
      if (doc.exists && doc.data().products && doc.data().products.length > 0) {
        state = doc.data();
        localStorage.setItem('dukan_state', JSON.stringify(state));
      } else {
        const s = localStorage.getItem('dukan_state');
        if(s){try{state=JSON.parse(s)}catch(e){}}
      }
      initializeAppUI();
    }).catch(e => {
      const s = localStorage.getItem('dukan_state');
      if(s){try{state=s=JSON.parse(s)}catch(e){}}
      initializeAppUI();
    });
  } else {
    if(!localStorage.getItem('dukan_state')){
      window.location.href = 'login.html';
    }
  }
});

function initializeAppUI(){
  document.getElementById('shop-name-header').textContent = state.settings?.shopName || 'দোকান ম্যানেজার';
  renderDuesLedgerList();
}

function renderDuesLedgerList() {
  const container = document.getElementById('dues-list-container');
  const dues = (state.dues || []).filter(d => d.remaining > 0).slice().reverse();

  if(!dues.length) {
    container.innerHTML = `
      <div style="text-align:center; padding:60px 20px; color:var(--text3);">
        <p style="font-size:16px;">📝 খাতার সব বাকি পরিশোধিত!</p>
        <p style="font-size:12px; margin-top:4px;">কোনো গ্রাহকের বাকি রেকর্ড পাওয়া যায়নি।</p>
      </div>
    `;
    return;
  }

  container.innerHTML = dues.map(d => {
    return `
      <div class="card">
        <div class="card-left" onclick="viewDueDetailsDetails(${d.id})">
          <div class="customer-name">👤 ${d.customer || d.name}</div>
          <div class="customer-meta">📱 ${d.phone || 'মোবাইল নম্বর নেই'}</div>
          <div class="customer-meta" style="font-size:11px; margin-top:3px; color:var(--green-dark);">📅 ${dateLabel(d.date)}</div>
        </div>
        <div class="card-right">
          <div class="due-amount">${bnMoney(d.remaining)}</div>
          <button type="button" class="btn-action" onclick="payPartial(${d.id})">💵 জমা নিন</button>
        </div>
      </div>
    `;
  }).join('');
}

function viewDueDetailsDetails(id) {
  const due = (state.dues || []).find(x => x.id === id);
  if(!due) return;

  let historyHtml = '';
  if(due.history && due.history.length > 0) {
    historyHtml = '<div style="margin-top:10px; font-weight:600; font-size:13px;">📜 জমার ইতিহাস:</div>';
    historyHtml += due.history.map(h => `
      <div class="history-item">
        🗓️ <strong>${dateLabel(h.date)}</strong> জমা নিয়েছে <span style="color:var(--green-dark); font-weight:700;">${bnMoney(h.amount)}</span>
      </div>
    `).join('');
  }

  document.getElementById('due-modal-body-content').innerHTML = `
    <div style="font-size:14px; color:var(--text);">
      <p style="margin-bottom:4px;"><strong>👤 গ্রাহকের নাম:</strong> ${due.customer || due.name}</p>
      <p style="margin-bottom:4px;"><strong>📱 মোবাইল নম্বর:</strong> ${due.phone || 'নেই'}</p>
      <p style="margin-bottom:4px;"><strong>📍 ঠিকানা:</strong> ${due.address || 'নেই'}</p>
      <p style="margin-bottom:4px;"><strong>📝 বিবরণ:</strong> ${due.desc || due.description || 'পণ্য বিক্রয়'}</p>
      <p style="margin-bottom:4px;"><strong>📅 প্রথম বাকির তারিখ:</strong> ${dateLabel(due.date)}</p>
      <hr style="margin:10px 0; border:0; border-top:1px dashed var(--border);">
      <p style="margin-bottom:4px;"><strong>💰 মোট বিল (Total Bill):</strong> ${bnMoney(due.amount)}</p>
      ${historyHtml}
      <div style="margin-top:12px; font-size:15px; background:var(--bg); padding:8px; border-radius:6px; display:flex; justify-content:space-between; border-top:1px dashed var(--border);">
        <span>বর্তমান মোট বাকি:</span> <strong style="color:var(--red); font-weight:700;">${bnMoney(due.remaining)}</strong>
      </div>
    </div>
  `;

  document.getElementById('due-details-modal').classList.add('open');
}

function closeModal() {
  document.getElementById('due-details-modal').classList.remove('open');
}

function payPartial(id) {
  const d = (state.dues || []).find(x => x.id === id);
  if (!d) return;

  const input = prompt(`গ্রাহকের বর্তমান বাকি ৳${bn(d.remaining)}\nকত টাকা জমা নিতে চান লিখুন:`);
  if (input === null) return;

  const amt = parseFloat(input);
  if (isNaN(amt) || amt <= 0) {
    alert("অনুগ্রহ করে সঠিক টাকার পরিমাণ লিখুন।");
    return;
  }

  if (amt > d.remaining) {
    alert("দুঃখিত! বাকি টাকার চেয়ে জমার পরিমাণ বেশি হতে পারবে না।");
    return;
  }

  // নতুন লেজার রেকর্ড পুশ ও ব্যালেন্স আপডেট মেকানিজম
  d.remaining = Math.max(0, d.remaining - amt);
  if(d.remaining <= 0) {
    d.status = 'paid';
  }

  if(!d.history) d.history = [];
  d.history.push({
    date: new Date().toISOString().split('T')[0],
    amount: amt
  });

  save();
  renderDuesLedgerList();
  closeModal();
  alert("💵 সফলভাবে জমা রিসিভ করা হয়েছে!");
}
</script>
</body>
</html>
