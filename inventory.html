<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>দোকান ম্যানেজার - স্টক</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --green:#1D9E75;--green-light:#E1F5EE;--green-dark:#0F6E56;
  --amber:#BA7517;--amber-light:#FAEEDA;
  --red:#A32D2D;--red-light:#FCEBEB;
  --bg:#F9F8F5;--white:#fff;
  --text:#2C2C2A;--text2:#5F5E5A;--text3:#888780;
  --border:#D3D1C7;--radius:12px;--radius-sm:8px;
}
body{font-family:'Hind Siliguri',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
button,input,select{font-family:'Hind Siliguri',sans-serif}

.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:var(--white);border-top:1px solid var(--border);display:flex;z-index:100}
.nav-btn{flex:1;padding:8px 4px 10px;background:none;text-decoration:none;display:flex;flex-direction:column;align-items:center;gap:3px;color:var(--text3);font-size:11px;border-top:2px solid transparent}
.nav-btn.active{color:var(--green);border-top-color:var(--green)}
.nav-btn svg{width:22px;height:22px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}

.header{background:var(--green);color:#fff;padding:14px 16px;display:flex;align-items:center;justify-content:space-between}
.header h1{font-size:18px;font-weight:700}
.container{padding:12px 12px 80px}
.section-title{font-size:14px;font-weight:600;color:var(--text);margin-bottom:12px}

.card{background:var(--white);border:1px solid var(--border);border-radius:var(--radius);padding:14px;margin-bottom:12px}
.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.stat-box{padding:10px;border-radius:var(--radius-sm);background:var(--bg)}
.stat-box.low{background:var(--red-light);color:var(--red)}
.stat-label{font-size:11px;color:var(--text3);margin-bottom:2px}
.stat-val{font-size:16px;font-weight:700}

.list-item{background:var(--white);border-radius:var(--radius-sm);border:1px solid var(--border);padding:11px 12px;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center}
.list-item-left{flex:1}
.list-item-name{font-size:14px;font-weight:600}
.list-item-sub{font-size:12px;color:var(--text3);margin-top:2px}
.list-item-right{text-align:right}
.list-item-price{font-size:14px;font-weight:700;color:var(--text)}
.list-item-stock{font-size:12px;font-weight:600;margin-top:2px;color:var(--green-dark)}
.list-item-stock.low{color:var(--red)}

.form-group{margin-bottom:12px}
.form-label{display:block;font-size:13px;font-weight:600;margin-bottom:5px}
.form-input{width:100%;border:1px solid var(--border);border-radius:var(--radius-sm);padding:10px 12px;outline:none;background:var(--white)}
.btn{display:inline-flex;align-items:center;justify-content:center;padding:10px 16px;border-radius:var(--radius-sm);font-size:14px;font-weight:600;border:none}
.btn-primary{background:var(--green);color:#fff}
.btn-full{width:100%}
.btn-sm{padding:6px 10px;font-size:12px}

.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:200;display:none;align-items:flex-end;justify-content:center}
.modal-overlay.open{display:flex}
.modal{background:var(--white);border-radius:20px 20px 0 0;padding:20px 16px 30px;width:100%;max-width:480px;max-height:90vh;overflow-y:auto}
.modal-title{font-size:17px;font-weight:700;margin-bottom:16px;display:flex;justify-content:space-between;align-items:center}
.modal-close{background:var(--gray-light);width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center}

.empty{text-align:center;padding:40px 20px;color:var(--text3)}
.filter-tabs{display:flex;gap:6px;overflow-x:auto;padding-bottom:4px;margin-bottom:12px}
.tab{padding:6px 12px;background:var(--white);border:1px solid var(--border);border-radius:20px;font-size:12px;white-space:nowrap;color:var(--text2);font-weight:500}
.tab.active{background:var(--green-light);color:var(--green-dark);border-color:var(--green)}
</style>
</head>
<body>

<div class="header">
  <h1 id="shop-name-header">দোকান ম্যানেজার</h1>
</div>

<div class="container">
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
    <div class="section-title" style="margin-bottom:0">পণ্য স্টক ও তালিকা</div>
    <button class="btn btn-primary btn-sm" onclick="openProductModal()">+ নতুন পণ্য</button>
  </div>

  <div class="card" style="padding:10px;margin-bottom:12px">
    <div class="stats-grid">
      <div class="stat-box">
        <div class="stat-label">মোট আইটেম</div>
        <div class="stat-val" id="total-items">০</div>
      </div>
      <div class="stat-box low" id="low-stock-box">
        <div class="stat-label" style="color:inherit">স্টক শেষ (কম)</div>
        <div class="stat-val" id="low-stock-items">০</div>
      </div>
    </div>
  </div>

  <div class="filter-tabs" id="category-tabs">
    <div class="tab active" onclick="filterCat('all')">সব পণ্য</div>
  </div>

  <div id="product-list"></div>
</div>

<nav class="bottom-nav">
  <a href="index.html" class="nav-btn">
    <svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
    হোম
  </a>
  <a href="sales2.html" class="nav-btn">
    <svg viewBox="0 0 24 24"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 001.98 1.61h9.72a2 2 0 001.98-1.61L23 6H6"/></svg>
    বিক্রয়
  </a>
  <a href="inventory.html" class="nav-btn active">
    <svg viewBox="0 0 24 24"><rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8M12 17v4"/></svg>
    স্টক
  </a>
  <a href="due.html" class="nav-btn">
    <svg viewBox="0 0 24 24"><rect x="1" y="4" width="22" height="16" rx="2"/><line x1="1" y1="10" x2="23" y2="10"/></svg>
    বাকি
  </a>
  <a href="report.html" class="nav-btn">
    <svg viewBox="0 0 24 24"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
    রিপোর্ট
  </a>
</nav>

<div class="modal-overlay" id="product-modal">
  <div class="modal">
    <div class="modal-title">📦 নতুন পণ্য যুক্ত করুন <button class="modal-close" onclick="closeProductModal()">✕</button></div>

    <div class="form-group">
      <label class="form-label">পণ্যের নাম <span style="color:red">*</span></label>
      <input type="text" class="form-input" id="prod-name" placeholder="যেমন: মিনিকেট চাল ২৫কেজি">
    </div>

    <div class="form-group">
      <label class="form-label">ক্যাটেগরি (ঐচ্ছিক)</label>
      <input type="text" class="form-input" id="prod-cat" placeholder="যেমন: মুদি, কসমেটিক্স">
    </div>

    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
      <div class="form-group">
        <label class="form-label">ক্রয় মূল্য (ঐচ্ছিক)</label>
        <input type="number" class="form-input" id="prod-buy" placeholder="০" min="0">
      </div>
      <div class="form-group">
        <label class="form-label">বিক্রয় মূল্য</label>
        <input type="number" class="form-input" id="prod-sell" placeholder="০" min="0">
      </div>
    </div>

    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
      <div class="form-group">
        <label class="form-label">স্টক পরিমাণ</label>
        <input type="number" class="form-input" id="prod-stock" placeholder="০" min="0">
      </div>
      <div class="form-group">
        <label class="form-label">একক (Unit)</label>
        <input type="text" class="form-input" id="prod-unit" placeholder="যেমন: পিস, কেজি, লিটার">
      </div>
    </div>

    <button class="btn btn-primary btn-full" onclick="saveProduct()" style="margin-top:10px">সংরক্ষণ করুন</button>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyCjgxzZQvpqdUNnAlr81UEwp5E6Rf6kbq4",
  authDomain: "hisab-khata-cf78c.firebaseapp.com",
  projectId: "hisab-khata-cf78c",
  storageBucket: "hisab-khata-cf78c.firebasestorage.app",
  messagingSenderId: "305149303536",
  appId: "1:305149303536:web:86f67fcb3c10a30b209867"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

let state = { settings:{shopName:'দোকান ম্যানেজার', lowStockThreshold:5}, products:[], sales:[], dues:[] };
let currentCategory = 'all';

function save(){
  if(!state || (!state.products && !state.sales && !state.dues)) return;

  localStorage.setItem('dukan_state', JSON.stringify(state));

  const user = auth.currentUser;
  if(user && state.products){
    db.collection("users").doc(user.uid).set(state)
      .catch(e => console.error("ক্লাউড ব্যাকআপ ব্যর্থ হয়েছে:", e));
  }
}

function bn(n){return String(Math.round(n)).replace(/[0-9]/g,c=>['০','১','২','৩','৪','৫','৬','৭','৮','৯'][c])}
function bnMoney(n){return '৳'+bn(n)}

const cachedState = localStorage.getItem('dukan_state');
if (cachedState) {
  try {
    state = JSON.parse(cachedState);
    if(!state.settings) state.settings = {shopName:'দোকান ম্যানেজার', lowStockThreshold:5};
    setTimeout(initializeAppUI, 10);
  } catch (e) {}
}

auth.onAuthStateChanged(user => {
  if (user) {
    db.collection("users").doc(user.uid).get().then(doc => {
      if (doc.exists && doc.data().products && doc.data().products.length > 0) {
        state = doc.data();
        if(!state.settings) state.settings = {shopName:'দোকান ম্যানেজার', lowStockThreshold:5};
        localStorage.setItem('dukan_state', JSON.stringify(state));
      } else {
        const s = localStorage.getItem('dukan_state');
        if(s){try{state=JSON.parse(s)}catch(e){}}
      }
      initializeAppUI();
    }).catch(e => {
      const s = localStorage.getItem('dukan_state');
      if(s){try{state=JSON.parse(s)}catch(e){}}
      initializeAppUI();
    });
  } else {
    if(!localStorage.getItem('dukan_state')){
      window.location.href = 'login.html';
    }
  }
});

function initializeAppUI(){
  document.getElementById('shop-name-header').textContent = state.settings?.shopName || 'দোকান ম্যানেজার';
  updateFilters();
  renderInventory();
}

function updateFilters(){
  const tabs = document.getElementById('category-tabs');
  const cats = new Set();
  (state.products || []).forEach(p => { if(p.cat && p.cat.trim()) cats.add(p.cat.trim()) });

  let html = `<div class="tab ${currentCategory==='all'?'active':''}" onclick="filterCat('all')">সব পণ্য</div>`;
  cats.forEach(c => {
    html += `<div class="tab ${currentCategory===c?'active':''}" onclick="filterCat('${c}')">${c}</div>`;
  });
  tabs.innerHTML = html;
}

function filterCat(cat){
  currentCategory = cat;
  updateFilters();
  renderInventory();
}

function renderInventory(){
  const list = document.getElementById('product-list');
  const prods = state.products || [];
  const limit = state.settings?.lowStockThreshold || 5;

  let filtered = prods;
  if(currentCategory !== 'all'){
    filtered = prods.filter(p => p.cat === currentCategory);
  }

  // গণনা আপডেট
  document.getElementById('total-items').textContent = bn(prods.length);
  const lowCount = prods.filter(p => p.stock <= limit).length;
  document.getElementById('low-stock-items').textContent = bn(lowCount);

  if(!filtered.length){
    list.innerHTML = '<div class="empty"><p>কোনো পণ্য পাওয়া যায়নি</p></div>';
    return;
  }

  // রেন্ডার তালিকা
  list.innerHTML = filtered.slice().reverse().map(p => {
    const isLow = p.stock <= limit;
    return `
      <div class="list-item">
        <div class="list-item-left">
          <div class="list-item-name">${p.name}</div>
          <div class="list-item-sub">${p.cat || 'ক্যাটেগরি নেই'} · কেনা: ${bnMoney(p.buyPrice || 0)}</div>
        </div>
        <div class="list-item-right">
          <div class="list-item-price">${bnMoney(p.sellPrice || 0)}</div>
          <div class="list-item-stock ${isLow?'low':''}">${isLow?'⚠️ ':''}${bn(p.stock)} ${p.unit || 'পিস'}</div>
        </div>
        <div style="margin-left:12px">
          <button onclick="deleteProduct(${p.id})" style="background:none;border:none;font-size:14px" title="মুছুন">🗑️</button>
        </div>
      </div>
    `;
  }).join('');
}

function openProductModal(){
  document.getElementById('product-modal').classList.add('open');
}
function closeProductModal(){ document.getElementById('product-modal').classList.remove('open') }

function deleteProduct(id){
  const confirmDelete = confirm("আপনি কি নিশ্চিতভাবে এই পণ্যটি ডিলিট করতে চান?");
  if(confirmDelete){
    state.products = (state.products || []).filter(p => p.id !== id);
    save();
    updateFilters();
    renderInventory();
  }
}

function saveProduct(){
  const name = document.getElementById('prod-name').value.trim();
  const cat = document.getElementById('prod-cat').value.trim();
  const unit = document.getElementById('prod-unit').value.trim() || 'পিস';
  const buy = parseFloat(document.getElementById('prod-buy').value)||0;
  const sell = parseFloat(document.getElementById('prod-sell').value)||0;
  const stock = parseFloat(document.getElementById('prod-stock').value)||0;

  if(!name){
    alert("অনুগ্রহ করে পণ্যের নাম লিখুন!");
    return;
  }

  if(!state.products) state.products = [];

  state.products.push({
    id: Date.now(),
    name,
    cat,
    buyPrice: buy,
    sellPrice: sell,
    stock,
    unit
  });

  save();
  closeProductModal();
  updateFilters();
  renderInventory();

  // ইনপুট ফিল্ডগুলো রিসেট করা
  document.getElementById('prod-name').value = '';
  document.getElementById('prod-cat').value = '';
  document.getElementById('prod-unit').value = '';
  document.getElementById('prod-buy').value = '';
  document.getElementById('prod-sell').value = '';
  document.getElementById('prod-stock').value = '';
}
</script>
</body>
</html>
